name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2 # bun version from package.json packageManager

      # Persist turbo's local task cache across runs so unchanged workspaces
      # skip typecheck/lint entirely. restore-keys lets PRs reuse main's cache.
      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Feature flags lint
        run: bun run flags:lint

      - name: Demo artifacts freshness
        run: bun run check:demo-artifacts

  monitoring-rules:
    name: Validate alert rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: promtool check rules
        run: |
          docker run --rm \
            -v "$PWD/infra/monitoring:/work" -w /work \
            --entrypoint promtool \
            prom/prometheus:v3.10.0 \
            check rules protifer.rules.yml

  docker-build:
    name: Docker build verification
    # PR-only: build.yml already builds these images on every main push.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image:
          - {
              name: api-gateway,
              dockerfile: services/api-gateway/Dockerfile,
              context: .,
            }
          - {
              name: embedding-worker,
              dockerfile: services/embedding-worker/Dockerfile,
              context: .,
            }
          - {
              name: prediction-worker,
              dockerfile: services/prediction-worker/Dockerfile,
              context: .,
            }
          - {
              name: garage-init,
              dockerfile: infra/garage/garage-init/Dockerfile,
              context: infra/garage/garage-init,
            }

    steps:
      - uses: actions/checkout@v6

      - name: Build ${{ matrix.image.name }}
        run: docker build -f ${{ matrix.image.dockerfile }} ${{ matrix.image.context }}

  triton-stub-image:
    name: Ensure triton-stub image
    # backend-e2e pulls the ~6 GB triton-stub image from GHCR. It is a slow-moving
    # artifact (changes only on a Triton version bump — entrypoint/identity are
    # mounted, not baked), so build+push it ONLY when the tag is missing; normal
    # runs are a sub-second manifest check. This keeps a Triton bump self-contained:
    # bump the tag in docker-compose.*.yml and the first PR run materialises it.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve stub version from compose
        id: resolve
        run: |
          version=$(grep -oE 'protifer-triton-stub:[0-9.]+' infra/docker-compose.test.yml | head -1 | cut -d: -f2)
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether the tag already exists
        id: check
        env:
          REF: ghcr.io/t03i/protifer-triton-stub:${{ steps.resolve.outputs.version }}
        run: |
          if docker manifest inspect "$REF" >/dev/null 2>&1; then
            echo "$REF already in GHCR — skipping build"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "$REF missing — will build"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # compose.py pulls the full (~11 GB) and min (~6 GB) images; reclaim first.
      - name: Reclaim runner disk
        if: steps.check.outputs.exists == 'false'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Set up Python
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Compose & push stub image
        if: steps.check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          IMAGE: ghcr.io/t03i/protifer-triton-stub
          PUSH: '1'
        run: ./infra/triton-stub/build.sh

  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest
    # The image is guaranteed present by triton-stub-image; here we only pull it.
    needs: triton-stub-image
    # GHCR pull of the ~6 GB triton-stub image needs packages:read + a docker login.
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      # Disk strategy for the ~6 GB triton-stub image (openspec change Decision 4).
      # Primary: point Docker's data-root at the larger /mnt ephemeral volume (~65 GB)
      # so the image + the rest of the test stack fit, avoiding a per-run reclaim.
      # Fallback if this fights the runner: jlumbroso/free-disk-space@main.
      - name: Relocate Docker data-root to /mnt
        run: |
          sudo systemctl stop docker docker.socket
          sudo mkdir -p /mnt/docker
          echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          echo "Docker root: $(docker info -f '{{.DockerRootDir}}')"
          df -h / /mnt

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2 # bun version from package.json packageManager

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start test stack
        # Generous timeout: first run pulls ~6 GB and a real tritonserver loads
        # the full active model set before reporting ready.
        run: docker compose -f infra/docker-compose.test.yml -p protifer-test up -d --build --wait --wait-timeout 300

      - name: Measure peak disk
        if: always()
        run: |
          df -h / /mnt
          docker system df

      - name: Run backend E2E tests
        run: bun run --filter @protifer/backend-e2e test

      - name: Teardown test stack
        if: always()
        run: docker compose -f infra/docker-compose.test.yml -p protifer-test down -v

  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-playwright
        with:
          working-directory: apps/web

      - name: Run Playwright e2e tests
        run: bun run test:e2e
        working-directory: apps/web
