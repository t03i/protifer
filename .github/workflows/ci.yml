name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2 # bun version from package.json packageManager

      # Persist turbo's local task cache across runs so unchanged workspaces
      # skip typecheck/lint entirely. restore-keys lets PRs reuse main's cache.
      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Feature flags lint
        run: bun run flags:lint

      - name: Demo artifacts freshness
        run: bun run check:demo-artifacts

  monitoring-rules:
    name: Validate alert rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: promtool check rules
        run: |
          docker run --rm \
            -v "$PWD/infra/monitoring:/work" -w /work \
            --entrypoint promtool \
            prom/prometheus:v3.10.0 \
            check rules protifer.rules.yml

  sentry-pii-config:
    name: Validate Sentry scrub config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate sentry-pii.json shape
        run: |
          set -euo pipefail
          f=infra/observability/sentry-pii.json
          jq -e '.rules and .applications' "$f" >/dev/null
          # Every rule is a valid pattern rule.
          jq -e 'all(.rules[]; .type=="pattern" and (.pattern|type=="string")
            and .redaction.method and .redaction.text)' "$f" >/dev/null
          # Every applied rule id is defined.
          jq -e '([.applications[][]] - (.rules|keys)) == []' "$f" >/dev/null

  docker-build:
    name: Docker build verification
    # PR-only: build.yml already builds these images on every main push.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image:
          - {
              name: api-gateway,
              dockerfile: services/api-gateway/Dockerfile,
              context: .,
            }
          - {
              name: embedding-worker,
              dockerfile: services/embedding-worker/Dockerfile,
              context: .,
            }
          - {
              name: prediction-worker,
              dockerfile: services/prediction-worker/Dockerfile,
              context: .,
            }
          - {
              name: garage-init,
              dockerfile: infra/garage/garage-init/Dockerfile,
              context: infra/garage/garage-init,
            }

    steps:
      - uses: actions/checkout@v6

      - name: Build ${{ matrix.image.name }}
        run: docker build -f ${{ matrix.image.dockerfile }} ${{ matrix.image.context }}

  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2 # bun version from package.json packageManager

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start test stack
        run: docker compose -f infra/docker-compose.test.yml -p protifer-test up -d --build --wait --wait-timeout 120

      - name: Run backend E2E tests
        run: bun run --filter @protifer/backend-e2e test

      - name: Teardown test stack
        if: always()
        run: docker compose -f infra/docker-compose.test.yml -p protifer-test down -v

  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-playwright
        with:
          working-directory: apps/web

      - name: Run Playwright e2e tests
        run: bun run test:e2e
        working-directory: apps/web
