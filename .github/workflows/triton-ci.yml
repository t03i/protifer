name: Triton CI

# Cheap, change-gated verification of the checked-in Triton model repository and
# the garage-init image. The imperative init container and the GitHub-Releases
# manifest path are gone — the model repo ships as a locally-built OCI artifact.
on:
  pull_request:
    paths:
      - 'infra/triton/**'
      - 'infra/garage/garage-init/**'
      - 'model-repository/**'
      - 'scripts/check-model-repository-layout.py'
      - 'infra/docker-compose.dev.yml'
      - '.github/workflows/triton-ci.yml'
  push:
    branches: [main]
    paths:
      - 'infra/triton/**'
      - 'infra/garage/garage-init/**'
      - 'model-repository/**'
      - 'scripts/check-model-repository-layout.py'
      - 'infra/docker-compose.dev.yml'
      - '.github/workflows/triton-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter reads the PR's changed-file list via the API

jobs:
  # Per-area change detection so the python tests gate on the triton path set
  # and the garage-init build gates only on its own context.
  changes:
    name: Detect changed areas
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      triton: ${{ steps.filter.outputs.triton }}
      garage: ${{ steps.filter.outputs.garage }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            triton:
              - 'infra/triton/**'
              - 'model-repository/**'
              - 'scripts/check-model-repository-layout.py'
              - 'infra/docker-compose.dev.yml'
              - '.github/workflows/triton-ci.yml'
            garage:
              - 'infra/garage/garage-init/**'

  # Remaining python suite (Viterbi decoder unit tests).
  python-tests:
    name: Python tests
    needs: changes
    if: needs.changes.outputs.triton == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install test deps
        run: pip install -r infra/triton/requirements-dev.txt
      - name: Run pytest suite
        run: pytest infra/triton/tests/

  # garage-init image build verification, gated on its own context.
  init-image-garage:
    name: Build garage-init image
    needs: changes
    if: needs.changes.outputs.garage == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: infra/garage/garage-init
          file: infra/garage/garage-init/Dockerfile
          push: false
          cache-from: type=gha,scope=protifer-garage-init
          cache-to: type=gha,mode=max,scope=protifer-garage-init
          provenance: false
