name: Model guards

on:
  push:
    branches: [main]
    paths:
      - scripts/check-model-repository-layout.py
      - model-repository/**
      - .github/workflows/model-guards.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/check-model-repository-layout.py
      - model-repository/**
      - .github/workflows/model-guards.yml

jobs:
  model-guards:
    name: Model repository layout guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check model repository layout
        run: python3 scripts/check-model-repository-layout.py
