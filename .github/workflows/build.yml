name: build

# Builds all service + infra images tagged with the immutable commit SHA
# (no mutable :prod — deploy/rollback are git operations on the deploy repos),
# then bumps the pinned image tag (image-tag.env) in the two doco-cd deploy repos.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.planning/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - {
              image: protifer-api-gateway,
              context: .,
              dockerfile: services/api-gateway/Dockerfile,
            }
          - {
              image: protifer-embedding-worker,
              context: .,
              dockerfile: services/embedding-worker/Dockerfile,
            }
          - {
              image: protifer-prediction-worker,
              context: .,
              dockerfile: services/prediction-worker/Dockerfile,
            }
          - {
              image: protifer-garage-init,
              context: infra/garage/garage-init,
              dockerfile: infra/garage/garage-init/Dockerfile,
            }
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ghcr.io/t03i/${{ matrix.service.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.image }}
          provenance: false

  # Bumps the pinned :<sha> by overwriting each deploy repo's image-tag.env
  bump-deploy-tags:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: deploy
    strategy:
      matrix:
        tier: [state, app]
    steps:
      - name: Mint deploy-app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: ${{ secrets.DEPLOY_OWNER }}
          repositories: ${{ secrets.DEPLOY_REPO_STATE }},${{ secrets.DEPLOY_REPO_APP }}

      - name: Checkout deploy repo
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.DEPLOY_OWNER }}/${{ secrets[format('DEPLOY_REPO_{0}', matrix.tier)] }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Write image tag env file
        run: |
          set -euo pipefail
          {
            echo '# CI-owned: the protifer build workflow overwrites this file on every deploy.'
            echo '# Roll back by `git revert`-ing the bump commit.'
            echo 'IMAGE_TAG=${{ github.sha }}'
          } > image-tag.env

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add image-tag.env
          if git diff --cached --quiet; then
            echo 'Tags already at this sha — nothing to deploy.'
            exit 0
          fi
          git commit -m "deploy(${{ matrix.tier }}): bump images to ${{ github.sha }}"
          git push

  rules-sync:
    name: Sync alert rules to Grafana Cloud
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: deploy
    steps:
      - uses: actions/checkout@v6

      - name: mimirtool rules sync (namespace protifer)
        env:
          MIMIR_ADDRESS: ${{ secrets.GRAFANA_CLOUD_MIMIR_ADDRESS }}
          MIMIR_TENANT_ID: ${{ secrets.GRAFANA_CLOUD_TENANT_ID }}
          MIMIR_API_KEY: ${{ secrets.GRAFANA_CLOUD_RULES_TOKEN }}
        run: |
          # mimirtool reads the namespace from the rules file itself — prepend
          # it here so the repo file stays pure Prometheus format for promtool.
          printf 'namespace: protifer\n' | cat - infra/monitoring/protifer.rules.yml > /tmp/protifer-rules-ns.yml
          docker run --rm \
            -v /tmp/protifer-rules-ns.yml:/rules.yml:ro \
            -e MIMIR_ADDRESS -e MIMIR_TENANT_ID -e MIMIR_API_KEY \
            grafana/mimirtool:2.17.11 \
            rules sync /rules.yml --namespaces protifer

  notify-sentry-release:
    needs: bump-deploy-tags
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: deploy
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for set_commits: auto

      # release-only: no `environment` input, so no Sentry deploy sub-event
      - uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          release: ${{ github.sha }}
          set_commits: auto
          ignore_missing: true
