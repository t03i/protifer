<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="Binding site track with metal, nucleic acid and small-molecule markers">
  <title>Binding site prediction</title>
  <g font-family="system-ui, sans-serif">
    <rect width="320" height="180" rx="12" fill="currentColor" fill-opacity="0.04" />
    <text x="16" y="26" font-size="12" font-weight="600" fill="currentColor">Binding sites</text>
    <g transform="translate(16,50)">
      <rect width="288" height="14" rx="3" fill="currentColor" fill-opacity="0.08" />
      <text x="-4" y="10" font-size="9" fill="currentColor" fill-opacity="0.7" text-anchor="end">metal</text>
      <circle cx="40" cy="7" r="5" fill="#c98b3a" />
      <circle cx="110" cy="7" r="5" fill="#c98b3a" />
      <circle cx="198" cy="7" r="5" fill="#c98b3a" />
    </g>
    <g transform="translate(16,80)">
      <rect width="288" height="14" rx="3" fill="currentColor" fill-opacity="0.08" />
      <text x="-4" y="10" font-size="9" fill="currentColor" fill-opacity="0.7" text-anchor="end">DNA/RNA</text>
      <rect x="60" y="2" width="30" height="10" rx="2" fill="#4a8c7a" />
      <rect x="160" y="2" width="46" height="10" rx="2" fill="#4a8c7a" />
    </g>
    <g transform="translate(16,110)">
      <rect width="288" height="14" rx="3" fill="currentColor" fill-opacity="0.08" />
      <text x="-4" y="10" font-size="9" fill="currentColor" fill-opacity="0.7" text-anchor="end">small mol.</text>
      <rect x="88" y="2" width="18" height="10" rx="2" fill="#8b7ab5" />
      <rect x="230" y="2" width="24" height="10" rx="2" fill="#8b7ab5" />
    </g>
    <g font-size="9" fill="currentColor" fill-opacity="0.6" transform="translate(16,150)">
      <text>residues</text>
    </g>
  </g>
</svg>
