<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="Gene Ontology terms with reliability index bars across three ontologies">
  <title>Gene Ontology predictions</title>
  <g font-family="system-ui, sans-serif">
    <rect width="320" height="180" rx="12" fill="currentColor" fill-opacity="0.04" />
    <text x="16" y="24" font-size="12" font-weight="600" fill="currentColor">Gene Ontology terms</text>
    <g transform="translate(16,40)" font-size="10" fill="currentColor">
      <g>
        <text y="10" font-size="9" fill="currentColor" fill-opacity="0.7">MFO · molecular function</text>
        <rect y="14" width="288" height="6" rx="2" fill="currentColor" fill-opacity="0.08" />
        <rect y="14" width="230" height="6" rx="2" fill="#8b7ab5" />
        <text y="32" font-size="9">GO:0005515 · protein binding · RI 0.80</text>
      </g>
      <g transform="translate(0,44)">
        <text y="10" font-size="9" fill="currentColor" fill-opacity="0.7">CCO · cellular component</text>
        <rect y="14" width="288" height="6" rx="2" fill="currentColor" fill-opacity="0.08" />
        <rect y="14" width="188" height="6" rx="2" fill="#4a8c7a" />
        <text y="32" font-size="9">GO:0005886 · plasma membrane · RI 0.65</text>
      </g>
      <g transform="translate(0,88)">
        <text y="10" font-size="9" fill="currentColor" fill-opacity="0.7">BPO · biological process</text>
        <rect y="14" width="288" height="6" rx="2" fill="currentColor" fill-opacity="0.08" />
        <rect y="14" width="148" height="6" rx="2" fill="#c98b3a" />
        <text y="32" font-size="9">GO:0007154 · cell communication · RI 0.52</text>
      </g>
    </g>
  </g>
</svg>
