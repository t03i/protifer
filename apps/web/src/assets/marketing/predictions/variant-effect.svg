<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="Variant effect heatmap showing substitution scores across positions">
  <title>Variant effect heatmap (VESPAi)</title>
  <g font-family="system-ui, sans-serif">
    <rect width="320" height="180" rx="12" fill="currentColor" fill-opacity="0.04" />
    <text x="16" y="26" font-size="12" font-weight="600" fill="currentColor">Variant effect (20 × N)</text>
    <g transform="translate(16,42)">
      <g id="vp-row0" />
      <g font-size="0">
        <!-- 20 rows × 24 columns heatmap; colors picked pseudo-randomly for a plausible look -->
        <g fill="#d9a87b"><rect x="0" y="0" width="12" height="5" /><rect x="12" y="0" width="12" height="5" fill-opacity="0.6" /><rect x="24" y="0" width="12" height="5" /><rect x="36" y="0" width="12" height="5" fill-opacity="0.8" /></g>
      </g>
    </g>
    <g transform="translate(16,44)">
      <!-- build heatmap programmatically via nested groups -->
      <!-- Row template: 24 cols x 6px wide, 6px tall -->
      <g>
        <g transform="translate(0,0)"><rect width="6" height="6" fill="#4a7cb0" /><rect x="6" width="6" height="6" fill="#6a8cbf" /><rect x="12" width="6" height="6" fill="#e0c98c" /><rect x="18" width="6" height="6" fill="#c26a55" /><rect x="24" width="6" height="6" fill="#8ea9c9" /><rect x="30" width="6" height="6" fill="#d88b6a" /><rect x="36" width="6" height="6" fill="#4a7cb0" /><rect x="42" width="6" height="6" fill="#c26a55" /><rect x="48" width="6" height="6" fill="#e0c98c" /><rect x="54" width="6" height="6" fill="#6a8cbf" /><rect x="60" width="6" height="6" fill="#8ea9c9" /><rect x="66" width="6" height="6" fill="#c26a55" /><rect x="72" width="6" height="6" fill="#4a7cb0" /><rect x="78" width="6" height="6" fill="#d88b6a" /><rect x="84" width="6" height="6" fill="#6a8cbf" /><rect x="90" width="6" height="6" fill="#e0c98c" /><rect x="96" width="6" height="6" fill="#c26a55" /><rect x="102" width="6" height="6" fill="#4a7cb0" /><rect x="108" width="6" height="6" fill="#8ea9c9" /><rect x="114" width="6" height="6" fill="#d88b6a" /><rect x="120" width="6" height="6" fill="#6a8cbf" /><rect x="126" width="6" height="6" fill="#e0c98c" /><rect x="132" width="6" height="6" fill="#c26a55" /><rect x="138" width="6" height="6" fill="#4a7cb0" /><rect x="144" width="6" height="6" fill="#6a8cbf" /><rect x="150" width="6" height="6" fill="#d88b6a" /><rect x="156" width="6" height="6" fill="#e0c98c" /><rect x="162" width="6" height="6" fill="#c26a55" /><rect x="168" width="6" height="6" fill="#4a7cb0" /><rect x="174" width="6" height="6" fill="#8ea9c9" /><rect x="180" width="6" height="6" fill="#d88b6a" /><rect x="186" width="6" height="6" fill="#6a8cbf" /><rect x="192" width="6" height="6" fill="#e0c98c" /><rect x="198" width="6" height="6" fill="#c26a55" /><rect x="204" width="6" height="6" fill="#4a7cb0" /><rect x="210" width="6" height="6" fill="#6a8cbf" /><rect x="216" width="6" height="6" fill="#d88b6a" /><rect x="222" width="6" height="6" fill="#e0c98c" /><rect x="228" width="6" height="6" fill="#c26a55" /><rect x="234" width="6" height="6" fill="#4a7cb0" /><rect x="240" width="6" height="6" fill="#8ea9c9" /><rect x="246" width="6" height="6" fill="#d88b6a" /><rect x="252" width="6" height="6" fill="#6a8cbf" /><rect x="258" width="6" height="6" fill="#e0c98c" /><rect x="264" width="6" height="6" fill="#c26a55" /><rect x="270" width="6" height="6" fill="#4a7cb0" /><rect x="276" width="6" height="6" fill="#6a8cbf" /><rect x="282" width="6" height="6" fill="#d88b6a" /></g>
        <use href="#ve-row" />
      </g>
    </g>
    <defs>
      <pattern id="ve-pat" patternUnits="userSpaceOnUse" width="6" height="6">
        <rect width="6" height="6" fill="#c26a55" />
      </pattern>
    </defs>
    <g transform="translate(16,52)" fill="url(#ve-pat)">
      <rect width="288" height="100" opacity="0.0" />
    </g>
    <g transform="translate(16,52)">
      <g>
        <!-- Remaining 19 rows, fill with smooth gradient bands -->
        <rect width="288" height="100" fill="url(#ve-gradient)" />
      </g>
    </g>
    <defs>
      <linearGradient id="ve-gradient" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0" stop-color="#4a7cb0" stop-opacity="0.85" />
        <stop offset="0.25" stop-color="#8ea9c9" stop-opacity="0.7" />
        <stop offset="0.5" stop-color="#e0c98c" stop-opacity="0.85" />
        <stop offset="0.75" stop-color="#d88b6a" stop-opacity="0.85" />
        <stop offset="1" stop-color="#c26a55" stop-opacity="0.9" />
      </linearGradient>
    </defs>
    <g font-size="9" fill="currentColor" fill-opacity="0.6">
      <text x="16" y="170">position</text>
      <text x="304" y="170" text-anchor="end">A..Y</text>
    </g>
  </g>
</svg>
